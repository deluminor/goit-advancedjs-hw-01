<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/goit-advancedjs-hw-01/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feedback Form</title>
    <script type="module" crossorigin src="/goit-advancedjs-hw-01/2-form.js"></script>
    <link rel="modulepreload" crossorigin href="/goit-advancedjs-hw-01/assets/modulepreload-polyfill-B5Qt9EMX.js">
    <link rel="stylesheet" crossorigin href="/goit-advancedjs-hw-01/assets/styles-B-UWH1Iw.css">
  </head>
  <body>
    <main class="form-page">
      <div class="container">
        <a class="back-link" href="./index.html">Back</a>
        <form class="feedback-form" autocomplete="off">
          <label class="form-label">
            Email
            <input class="form-input" type="email" name="email" autofocus />
          </label>
          <label class="form-label">
            Message
            <textarea class="form-textarea" name="message" rows="8"></textarea>
          </label>
          <button class="form-button" type="submit">Submit</button>
        </form>
      </div>
    </main>

  </body>
</html>
